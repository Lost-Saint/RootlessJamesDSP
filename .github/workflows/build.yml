name: Build APKs

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }} APKs
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: RootlessFull
            gradle_variant: RootlessFull
            output_flavor: rootlessFull
            branch_build_type: Preview
            tag_build_type: Release
          - name: RootlessFdroid
            gradle_variant: RootlessFdroid
            output_flavor: rootlessFdroid
            branch_build_type: Release
            tag_build_type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$ANDROID_KEYSTORE_BASE64" || -z "$ANDROID_KEYSTORE_PASSWORD" || -z "$ANDROID_KEY_ALIAS" || -z "$ANDROID_KEY_PASSWORD" ]]; then
            echo "Release signing secrets are missing. Add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD."
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.jks
          cat > keystore.properties <<EOF
          storeFile=../release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Select build type
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            BUILD_TYPE="${{ matrix.tag_build_type }}"
          else
            BUILD_TYPE="${{ matrix.branch_build_type }}"
          fi
          OUTPUT_TYPE="$(echo "$BUILD_TYPE" | tr '[:upper:]' '[:lower:]')"
          echo "GRADLE_TASK=:app:assemble${{ matrix.gradle_variant }}${BUILD_TYPE}" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=app/build/outputs/apk/${{ matrix.output_flavor }}/${OUTPUT_TYPE}" >> "$GITHUB_ENV"
          echo "OUTPUT_TYPE=${OUTPUT_TYPE}" >> "$GITHUB_ENV"

      - name: Build APKs
        run: ./gradlew "${{ env.GRADLE_TASK }}"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}JamesDSP-${{ env.OUTPUT_TYPE }}-apks
          path: ${{ env.OUTPUT_DIR }}/*.apk
          if-no-files-found: error

  release:
    name: Create draft release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-apks
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: RootlessJamesDSP ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: release-apks/*.apk
